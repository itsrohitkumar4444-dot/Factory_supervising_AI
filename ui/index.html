<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Groq AI Interface</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-mesh"></div>
    <div class="chat-container">
        <header>
            <div class="status-indicator"></div>
            <h1>Shadow Floor Engineer</h1>
            <span class="model-tag">gpt-oss-120b</span>
        </header>
        
        <main id="chat-box">
            <div class="message system">
                <div class="avatar">⚡</div>
                <div class="message-content">Hello, I am connected to the Groq API. How can I assist you with the factory floor today?</div>
            </div>
        </main>

        <form id="chat-form">
            <input type="text" id="user-input" placeholder="Type your message..." autocomplete="off" required>
            <button type="submit" id="send-btn">
                <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
